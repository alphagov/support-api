version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    cooldown:
      default-days: 3
    groups:
      test:
        patterns:
        - "ci_reporter*"
        - "climate_control"
        - "factory_bot*"
        - "rspec-*"
        - "shoulda*"
        - "timecop"
        - "simplecov"
        - "webmock"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    cooldown:
      default-days: 3
